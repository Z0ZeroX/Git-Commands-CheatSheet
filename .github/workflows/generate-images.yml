name: Generate CodeSnap Images

on:
  pull_request:
    paths:
      - 'docs/git-cheatsheet.md'
    branches:
      - main
  push:
    paths:
      - 'docs/git-cheatsheet.md'
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-images:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate images
        run: npm run img:generate
      
      - name: Upload images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-images
          path: docs/public/downloads/git-cheatsheet-codesnap.png
          retention-days: 90

  publish-images:
    needs: generate-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Download images artifact
        uses: actions/download-artifact@v4
        with:
          name: generated-images
          path: docs/public/downloads/

      - name: Commit and push images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: "chore: auto-generate CodeSnap images from markdown [skip ci]"
          file_pattern: docs/public/downloads/*.png
          skip_fetch: false
          skip_checkout: false
